name: Book Price Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-main.txt

      - name: Check env vars
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          test -n "$SERPAPI_KEY" && echo "SERPAPI_KEY OK" || echo "SERPAPI_KEY MISSING"
          test -n "$SUPABASE_URL" && echo "SUPABASE_URL OK" || echo "SUPABASE_URL MISSING"
          test -n "$SUPABASE_SERVICE_ROLE_KEY" && echo "SUPABASE_SERVICE_ROLE_KEY OK" || echo "SUPABASE_SERVICE_ROLE_KEY MISSING"
          test -n "$SUPABASE_KEY" && echo "SUPABASE_KEY OK" || echo "SUPABASE_KEY MISSING"

      - name: Run python book_price_monitor.py
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python book_price_monitor.py
