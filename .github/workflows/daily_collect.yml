name: Daily price collection

# Esqueleto do workflow diário existente (para referência — ajuste o `run`
# para o seu coletor real). Os dois ymls convivem no mesmo repo.

on:
  schedule:
    # Todo dia às 09:00 UTC (06:00 BRT)
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: daily-collect
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-jobs.txt

      - name: Run collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Substitua pelo seu script real de coleta diária.
          python collect_daily_prices.py
